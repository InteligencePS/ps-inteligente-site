<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fratura Fechada</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f8;margin:0}
.container{max-width:900px;margin:40px auto;background:#fff;padding:30px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
h1{color:#0b7285}h2{color:#444}
pre{white-space:pre-wrap;font-family:Arial;font-size:15px;line-height:1.5;background:#fafafa;padding:20px;border-radius:8px}
button{background:#0b7285;color:#fff;border:none;padding:12px 18px;border-radius:8px;cursor:pointer}
</style>
</head>
<body>
<div class="container">
<h1>🦴 Fratura Fechada</h1>
<h2>Aguardando agendamento cirúrgico</h2>
<button onclick="navigator.clipboard.writeText(document.getElementById('txt').innerText)">📋 Copiar prescrição</button>
<pre id="txt">
FRATURA FECHADA

AGUARDANDO AGENDAMENTO CIRÚRGICO

DIAGNÓSTICO:
Fratura fechada com indicação cirúrgica.

Cole aqui a prescrição completa exatamente como você utiliza no hospital.
</pre>
</div>
</body>
</html>
